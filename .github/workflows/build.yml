name: build

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            display: windows
            ext: .exe
          - goos: linux
            goarch: amd64
            display: linux
            ext: ""
          - goos: linux
            goarch: arm64
            display: linux-arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            display: macos
            ext: ""
          - goos: darwin
            goarch: arm64
            display: macos-arm64
            ext: ""

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: 编译
        run: |
          tag="${{ github.ref_name }}"
          [ "$tag" = "main" ] && tag="dev"
          name="voidhawk_${tag}_${{ matrix.display }}${{ matrix.ext }}"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags="-s -w" -o "$name" .

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: voidhawk_${{ matrix.display }}
          path: voidhawk_*

  release:
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 上传到 Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          find artifacts -type f -exec gh release upload ${{ github.ref_name }} {} \;
