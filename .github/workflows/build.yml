name: build

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    strategy:
      matrix:
        os: [windows, linux, macos]
        arch: [amd64, arm64]
        exclude:
          - os: windows
            arch: arm64

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: 编译
        run: |
          ext=""
          if [ "${{ matrix.os }}" = "windows" ]; then ext=".exe"; fi
          name="voidhawk_${{ github.ref_name }}_${{ matrix.os }}_${{ matrix.arch }}${ext}"
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -ldflags="-s -w" -o "$name" .
          echo "name=$name" >> $GITHUB_ENV

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: voidhawk_${{ matrix.os }}_${{ matrix.arch }}
          path: voidhawk_*

  release:
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 上传到 Release 页面
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*/*
